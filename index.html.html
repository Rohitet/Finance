<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Finance Tracker Dashboard</title>
  <!-- Icons -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      background: rgba(255, 255, 255, 0.95);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      margin-bottom: 20px;
      text-align: center;
    }

    h1 {
      color: #2c3e50;
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #7f8c8d;
      font-size: 1.1em;
    }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      background: white;
      border-radius: 15px;
      padding: 25px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h2 {
      color: #2c3e50;
      margin-bottom: 20px;
      font-size: 1.5em;
      border-bottom: 3px solid #667eea;
      padding-bottom: 10px;
    }

    .balance-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .balance-card h2 {
      border-bottom-color: rgba(255,255,255,0.3);
    }

    .balance-amount {
      font-size: 2.5em;
      font-weight: bold;
      margin: 10px 0;
    }

    .balance-label {
      font-size: 1.1em;
      opacity: 0.9;
    }

    .income-card {
      background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
      color: white;
    }

    .expense-card {
      background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
      color: white;
    }

    .form-group {
      margin-bottom: 15px;
    }

    .form-group label {
      display: block;
      margin-bottom: 5px;
      color: #2c3e50;
      font-weight: 600;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1em;
      transition: border-color 0.3s ease;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 8px;
      font-size: 1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      width: 100%;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-danger {
      background: #e74c3c;
      color: white;
      padding: 8px 15px;
      font-size: 0.9em;
    }

    .btn-danger:hover {
      background: #c0392b;
    }

    .btn-edit {
      background: #3498db;
      color: white;
      padding: 8px 15px;
      font-size: 0.9em;
      margin-right: 5px;
    }

    .btn-edit:hover {
      background: #2980b9;
    }

    .btn-success {
      background: #27ae60;
      color: white;
      padding: 8px 15px;
      font-size: 0.9em;
    }

    .btn-success:hover {
      background: #219150;
    }

    .btn-secondary {
      background: #95a5a6;
      color: white;
      padding: 8px 15px;
      font-size: 0.9em;
    }

    .btn-secondary:hover {
      background: #7f8c8d;
    }

    .transaction-list {
      list-style: none;
      max-height: 400px;
      overflow-y: auto;
    }

    .transaction-item {
      background: #f8f9fa;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 4px solid #667eea;
      transition: all 0.3s ease;
    }

    .transaction-item:hover {
      background: #e9ecef;
      transform: translateX(5px);
    }

    .transaction-item.income {
      border-left-color: #27ae60;
    }

    .transaction-item.expense {
      border-left-color: #e74c3c;
    }

    .transaction-info {
      flex: 1;
    }

    .transaction-note {
      font-weight: 600;
      color: #2c3e50;
      margin-bottom: 5px;
    }

    .transaction-meta {
      font-size: 0.85em;
      color: #7f8c8d;
    }

    .transaction-amount {
      font-weight: bold;
      font-size: 1.2em;
      margin-right: 15px;
    }

    .transaction-amount.income {
      color: #27ae60;
    }

    .transaction-amount.expense {
      color: #e74c3c;
    }

    .transaction-actions {
      display: flex;
      gap: 5px;
    }

    .filters {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    .filters select,
    .filters input {
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 0.9em;
    }

    .filters select:focus,
    .filters input:focus {
      outline: none;
      border-color: #667eea;
    }

    .chart-container {
      position: relative;
      height: 300px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }

    .stat-item {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-value {
      font-size: 1.5em;
      font-weight: bold;
      color: #2c3e50;
    }

    .stat-label {
      font-size: 0.9em;
      color: #7f8c8d;
      margin-top: 5px;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: #7f8c8d;
    }

    .empty-state i {
      font-size: 3em;
      margin-bottom: 15px;
      opacity: 0.5;
    }

    .budget-alert {
      background: #fff3cd;
      border: 2px solid #ffc107;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      display: none;
    }

    .budget-alert.show {
      display: block;
    }

    .budget-alert i {
      color: #ffc107;
      margin-right: 10px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: white;
      margin-top: 30px;
    }

    .export-buttons {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }

    @media (max-width: 768px) {
      .form-row {
        grid-template-columns: 1fr;
      }
      
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
      
      .transaction-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
      
      .transaction-actions {
        width: 100%;
        justify-content: flex-end;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><i class="fas fa-chart-line"></i> Finance Tracker Dashboard</h1>
      <p class="subtitle">Smart & Secure Financial Management</p>
    </header>

    <div class="dashboard-grid">
      <!-- Balance Cards -->
      <div class="card balance-card">
        <h2><i class="fas fa-wallet"></i> Total Balance</h2>
        <div class="balance-amount" id="totalBalance">₹0</div>
        <div class="balance-label">Current Balance</div>
      </div>

      <div class="card income-card">
        <h2><i class="fas fa-arrow-up"></i> Total Income</h2>
        <div class="balance-amount" id="totalIncome">₹0</div>
        <div class="balance-label">All Time Income</div>
      </div>

      <div class="card expense-card">
        <h2><i class="fas fa-arrow-down"></i> Total Expense</h2>
        <div class="balance-amount" id="totalExpense">₹0</div>
        <div class="balance-label">All Time Expense</div>
      </div>
    </div>

    <div class="dashboard-grid">
      <!-- Add Transaction Form -->
      <div class="card">
        <h2><i class="fas fa-plus-circle"></i> Add Transaction</h2>
        <form id="transactionForm">
          <input type="hidden" id="editIndex" value="-1">
          
          <div class="form-group">
            <label><i class="fas fa-comment"></i> Note</label>
            <input type="text" id="note" placeholder="Enter transaction note" required>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label><i class="fas fa-rupee-sign"></i> Amount</label>
              <input type="number" id="amount" placeholder="Enter amount" min="0" step="0.01" required>
            </div>
            <div class="form-group">
              <label><i class="fas fa-calendar"></i> Date</label>
              <input type="date" id="date" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label><i class="fas fa-exchange-alt"></i> Type</label>
              <select id="type" required>
                <option value="income">Income</option>
                <option value="expense">Expense</option>
              </select>
            </div>
            <div class="form-group">
              <label><i class="fas fa-tag"></i> Category</label>
              <select id="category" required>
                <option value="salary">Salary</option>
                <option value="business">Business</option>
                <option value="investment">Investment</option>
                <option value="gift">Gift</option>
                <option value="food">Food</option>
                <option value="transport">Transport</option>
                <option value="entertainment">Entertainment</option>
                <option value="utilities">Utilities</option>
                <option value="shopping">Shopping</option>
                <option value="health">Health</option>
                <option value="education">Education</option>
                <option value="other">Other</option>
              </select>
            </div>
          </div>

          <div class="form-group">
            <label><i class="fas fa-comment-dots"></i> Description (Optional)</label>
            <textarea id="description" rows="2" placeholder="Additional details"></textarea>
          </div>

          <button type="submit" class="btn-primary" id="submitBtn">
            <i class="fas fa-plus"></i> Add Transaction
          </button>
          
          <button type="button" class="btn-secondary" id="cancelEditBtn" style="display: none; margin-top: 10px; width: 100%;">
            <i class="fas fa-times"></i> Cancel Edit
          </button>
        </form>
      </div>

      <!-- Budget Alert -->
      <div class="card">
        <h2><i class="fas fa-bullseye"></i> Budget Alert</h2>
        <div class="budget-alert" id="budgetAlert">
          <i class="fas fa-exclamation-triangle"></i>
          <span id="alertMessage">You're approaching your budget limit!</span>
        </div>
        <div class="form-group">
          <label><i class="fas fa-bullseye"></i> Set Monthly Budget</label>
          <input type="number" id="budgetLimit" placeholder="Enter monthly budget" min="0" step="0.01">
        </div>
        <button type="button" class="btn-primary" id="setBudgetBtn">
          <i class="fas fa-check"></i> Set Budget
        </button>
        <div class="stats-grid">
          <div class="stat-item">
            <div class="stat-value" id="budgetUsed">0%</div>
            <div class="stat-label">Budget Used</div>
          </div>
          <div class="stat-item">
            <div class="stat
